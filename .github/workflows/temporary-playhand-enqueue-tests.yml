name: Temporary PlayHand enqueue validation

on:
  push:
    branches:
      - agent/fix-playhand-resume-enqueue
  pull_request:
    branches: [master]

jobs:
  targeted-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: python -m pip install -e . pytest
      - name: Run targeted tests
        run: >-
          python -m pytest -q
          tests/test_play_hand_lab_enqueue.py
          tests/test_play_hand_lab_entrypoint.py
