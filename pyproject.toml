build-forward-response-atlas = "autoresearch.__main__:main"
build-anchor-pair-atlas = "autoresearch.__main__:main"
run-anchor-pair-probes = "autoresearch.__main__:main"
build-anchor-pair-timing-atlas = "autoresearch.__main__:main"
run-anchor-pair-timing-probes = "autoresearch.__main__:main"
build-playhand-outcome-priors = "autoresearch.__main__:main"
