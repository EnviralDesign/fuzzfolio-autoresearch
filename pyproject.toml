[project]
name = "autoresearch"
version = "0.1.0"
description = "Autonomous Fuzzfolio research loop"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.28.1",
    "matplotlib>=3.10.8",
    "pydantic==2.12.5",
    "requests>=2.32.0",
    "rich>=13.9.4",
    "uvicorn[standard]>=0.40.0",
    "websockets>=16.0",
]

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
doctor = "autoresearch.__main__:main"
test-providers = "autoresearch.__main__:main"
play-hand = "autoresearch.__main__:main"
